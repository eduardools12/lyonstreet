<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lyon Streetwear— Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Nunito+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-page">

  <div class="login-wrapper">

    <div class="login-side d-none d-lg-flex">
      <div class="login-side-bg-text">Lyon</div>
      <div class="login-side-content">
        <div class="logo mb-4">L<em>Y</em>ON</div>
        <p class="login-side-tagline">Estilo<br><em>e identidade</em></p>
        <div class="login-side-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <div class="login-form-side">
      <div class="login-form-wrap">

        <div class="logo login-logo-mobile d-lg-none mb-4">VE<em>L</em>OUR</div>

        <h2 class="login-title">Bem-vindo de volta</h2>
        <p class="login-subtitle">Entre na sua conta para continuar</p>

        <form id="loginForm" novalidate>

          <div class="mb-3">
            <label class="login-label" for="inputEmail">E-mail</label>
            <div class="login-input-wrap">
              <i class="bi bi-envelope login-input-icon"></i>
              <input
                type="email"
                class="login-input"
                id="inputEmail"
                placeholder="seu@email.com"
                required
              />
            </div>
          </div>

          <div class="mb-4">
            <div class="d-flex justify-content-between align-items-center mb-1">
              <label class="login-label" for="inputPassword">Senha</label>
              <a href="#" class="login-forgot">Esqueci minha senha</a>
            </div>
            <div class="login-input-wrap">
              <i class="bi bi-lock login-input-icon"></i>
              <input
                type="password"
                class="login-input"
                id="inputPassword"
                placeholder="••••••••"
                required
              />
              <button type="button" class="login-toggle-pass" id="togglePass" tabindex="-1">
                <i class="bi bi-eye" id="togglePassIcon"></i>
              </button>
            </div>
          </div>

          <div class="mb-4 d-flex align-items-center gap-2">
            <input type="checkbox" class="login-check" id="rememberMe" />
            <label class="login-check-label" for="rememberMe">Lembrar de mim</label>
          </div>

          <button type="submit" class="login-btn w-100">
            Entrar
            <i class="bi bi-arrow-right ms-2"></i>
          </button>

        </form>

        <div class="login-divider"><span>ou</span></div>

        <p class="login-register-text">
          Não tem uma conta?
          <a href="#" class="login-register-link">Criar conta</a>
        </p>

      </div>
    </div>

  </div>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Toggle senha visível/oculta
    document.getElementById('togglePass').addEventListener('click', function () {
      const input = document.getElementById('inputPassword');
      const icon  = document.getElementById('togglePassIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
      }
    });

    // Submit simples
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      window.location.href = 'index.html';
    });
  </script>

</body>
</html>
